---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: ingress-nginx
      version: ">=4.10.0 <5.0.0"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  targetNamespace: ingress-nginx
  values:
    controller:
      # NodePort para kubeadm single-node (no hay cloud LB)
      service:
        type: NodePort
        nodePorts:
          http: 30080
          https: 30443
      # QoS: Guaranteed para el controller
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      # Habilitar IngressClass por defecto
      ingressClassResource:
        name: nginx
        enabled: true
        default: true
      # Configuración como API Gateway ligero
      config:
        # Rate limiting global
        limit-req-status-code: "429"
        # Headers de seguridad
        hide-headers: "X-Powered-By,Server"
        add-headers: "ingress-nginx/custom-headers"
        # Timeouts
        proxy-connect-timeout: "10"
        proxy-read-timeout: "60"
        proxy-send-timeout: "60"
      # Métricas para Prometheus
      metrics:
        enabled: true
        serviceMonitor:
          enabled: false  # Habilitar cuando tengas Prometheus instalado
      # PSA: el namespace ingress-nginx tendrá nivel baseline
      podAnnotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
