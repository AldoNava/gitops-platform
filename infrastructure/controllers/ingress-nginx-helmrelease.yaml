---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: ingress-nginx
      version: ">=4.10.0 <5.0.0"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  targetNamespace: ingress-nginx
  releaseName: ingress-nginx
  values:
    controller:
      service:
        type: NodePort
        nodePorts:
          http: 30080
          https: 30443
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      ingressClassResource:
        name: nginx
        enabled: true
        default: true
      config:
        limit-req-status-code: "429"
        hide-headers: "X-Powered-By,Server"
        proxy-connect-timeout: "10"
        proxy-read-timeout: "60"
        proxy-send-timeout: "60"
      admissionWebhooks:
        enabled: false
