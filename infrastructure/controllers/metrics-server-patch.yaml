---
# Patch metrics-server para kubeadm single-node (kubelet TLS sin cert válido)
# Esto resuelve el estado Pending del metrics-server-75b5d87c9d-2x9j7
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  template:
    spec:
      containers:
        - name: metrics-server
          args:
            - --cert-dir=/tmp
            - --secure-port=10250
            - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
            - --kubelet-use-node-status-port
            - --metric-resolution=15s
            - --kubelet-insecure-tls   # Necesario en kubeadm sin cert válido para kubelet
