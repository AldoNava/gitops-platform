---
# API Gateway centralizado para DEV
# Acceso: http://<TAILSCALE_IP>:30080/<tenant-path>
# Todos los tenants del ambiente dev expuestos bajo un único Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-dev
  namespace: ingress-nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Rate limiting: 20 req/s por IP en dev
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    # Proxy headers
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Environment: dev";
      more_set_headers "X-Request-ID: $request_id";
spec:
  ingressClassName: nginx
  rules:
    - host: api-dev.local   # Agregar a /etc/hosts: <TAILSCALE_IP> api-dev.local
      http:
        paths:
          # team-payments: /payments/* → payments-api service en namespace team-payments-dev
          - path: /payments(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: payments-api
                port:
                  number: 8080
          # team-auth: /auth/* → auth-api service en namespace team-auth-dev
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-api
                port:
                  number: 8080
          # team-gateway: /gateway/* → internal status/health
          - path: /gateway(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway-api
                port:
                  number: 8080
          # Health check global
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: gateway-api
                port:
                  number: 8080
