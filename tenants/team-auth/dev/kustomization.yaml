---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: team-auth-dev
resources:
  - ../base
images:
  - name: stefanprodan/podinfo
    newTag: "6.6.0"
patches:
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
    target:
      kind: HorizontalPodAutoscaler
      name: auth-api
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "team-auth | DEV 🟢"
    target:
      kind: Deployment
      name: auth-api
commonLabels:
  environment: dev
