---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: team-payments-test

resources:
  - ../base

# Renombrar namespace para test
namePrefix: ""
nameSuffix: ""

patches:
  # Renombrar namespace a team-payments-test
  - patch: |-
      - op: replace
        path: /metadata/name
        value: team-payments-test
    target:
      kind: Namespace
      name: team-payments-dev

  # PSA: test usa privileged (para testing exhaustivo)
  - patch: |-
      - op: replace
        path: /metadata/labels/pod-security.kubernetes.io~1enforce
        value: privileged
      - op: replace
        path: /metadata/labels/pod-security.kubernetes.io~1warn
        value: privileged
      - op: replace
        path: /metadata/labels/pod-security.kubernetes.io~1audit
        value: privileged
    target:
      kind: Namespace
      name: team-payments-dev

  # HPA: más réplicas en test
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5
    target:
      kind: HorizontalPodAutoscaler
      name: payments-api

  # Deployment: mensaje de ambiente + QoS más recursos para test
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "team-payments | TEST 🟡"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "256Mi"
    target:
      kind: Deployment
      name: payments-api

  # NetworkPolicy: egress hacia auth-test
  - patch: |-
      - op: replace
        path: /spec/egress/0/to/0/namespaceSelector/matchLabels/environment
        value: test
    target:
      kind: NetworkPolicy
      name: allow-egress-to-auth

# Image tag: se actualiza al promover de dev a test
images:
  - name: stefanprodan/podinfo
    newTag: "6.6.3"   # ← PROMOTION POINT: GitHub Action actualiza este valor al aprobar PR

