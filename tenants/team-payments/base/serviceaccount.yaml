---
# ServiceAccount para team-payments
# En EKS: se añadiría annotation eks.amazonaws.com/role-arn para IRSA
# En local: SA sin binding a IAM (simulado)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments-api
  namespace: team-payments-dev   # Se reemplaza por patch en cada ambiente
  labels:
    app.kubernetes.io/name: payments-api
    app.kubernetes.io/part-of: gitops-platform
    tenant: team-payments
  # Annotation IRSA (comentada para local, descomentar en EKS):
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/payments-api-role
automountServiceAccountToken: false  # Seguridad: no montar token si no se necesita
