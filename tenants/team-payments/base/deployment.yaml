---
# Deployment base para team-payments
# QoS Class: Guaranteed (requests == limits en CPU y Memory)
# Image: stefanprodan/podinfo - simula una API REST con /version, /healthz, /metrics
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: team-payments-dev
  labels:
    app.kubernetes.io/name: payments-api
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/component: api
    tenant: team-payments
spec:
  # replicas se controla por HPA; definimos 1 como mínimo base
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payments-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero-downtime deploy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments-api
        app.kubernetes.io/part-of: gitops-platform
        tenant: team-payments
        environment: dev   # Se sobreescribe por patch
      annotations:
        # Prometheus scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: "9898"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: payments-api
      automountServiceAccountToken: false

      # Security Context a nivel Pod (PSA baseline compatible)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # Anti-affinity: no dos pods payments en el mismo nodo (en multi-node)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: payments-api
                topologyKey: kubernetes.io/hostname

      containers:
        - name: payments-api
          # Image tag se sobreescribe por ambiente via kustomize
          image: stefanprodan/podinfo:6.6.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9898
              protocol: TCP
            - name: grpc
              containerPort: 9999
              protocol: TCP

          env:
            - name: PODINFO_UI_COLOR
              value: "#4CAF50"   # Verde para payments
            - name: PODINFO_UI_MESSAGE
              value: "team-payments | dev"   # Se sobreescribe por ambiente
            - name: PODINFO_PORT
              value: "9898"

          # Security Context a nivel container (PSA restricted compatible)
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

          # QoS Guaranteed: requests == limits
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 100m      # Igual al request → QoS Guaranteed
              memory: 128Mi  # Igual al request → QoS Guaranteed

          # Probes
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12   # 60s para startup

          # Volume para tmp (readOnlyRootFilesystem requiere esto)
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      # Tolerations para control-plane single-node (kubeadm)
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
