---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: team-payments-dev
  labels:
    app.kubernetes.io/name: payments-api
    app.kubernetes.io/part-of: gitops-platform
    tenant: team-payments
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: payments-api
  ports:
    - name: http
      port: 8080
      targetPort: http    # → containerPort 9898
      protocol: TCP
