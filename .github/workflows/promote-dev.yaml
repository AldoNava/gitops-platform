---
# Workflow: Promoción automática a DEV
# Trigger: push a main (después de merge de PR)
# Acción: actualiza el image tag en todos los tenants/*/dev/kustomization.yaml
# Flux detecta el commit via webhook y reconcilia en segundos

name: promote-to-dev

on:
  push:
    branches:
      - main
    paths:
      # Solo si cambia algún archivo de valores/imagen (no estructura)
      - 'tenants/**/base/**'
      - '.trigger-version'   # Archivo especial para forzar promoción

env:
  # Imagen base a actualizar (en este caso podinfo como ejemplo)
  IMAGE_NAME: stefanprodan/podinfo

jobs:
  detect-new-version:
    name: "Detect image version"
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.get_tag.outputs.tag }}
      should_promote: ${{ steps.get_tag.outputs.should_promote }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}
          fetch-depth: 2

      - name: Get image tag from trigger file
        id: get_tag
        run: |
          # Lee el tag del archivo .trigger-version si existe
          if [ -f ".trigger-version" ]; then
            TAG=$(cat .trigger-version | tr -d '[:space:]')
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "should_promote=true" >> $GITHUB_OUTPUT
            echo "🏷️ Promoting version: $TAG"
          else
            echo "should_promote=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No .trigger-version file, skipping promotion"
          fi

  promote-dev:
    name: "Auto-promote to DEV"
    runs-on: ubuntu-latest
    needs: detect-new-version
    if: needs.detect-new-version.outputs.should_promote == 'true'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "gitops-bot"
          git config user.email "gitops-bot@github.com"

      - name: Update image tag in DEV overlays
        env:
          NEW_TAG: ${{ needs.detect-new-version.outputs.new_tag }}
        run: |
          echo "🚀 Updating DEV image tag to: $NEW_TAG"
          
          for tenant in team-payments team-auth team-gateway; do
            FILE="tenants/$tenant/dev/kustomization.yaml"
            if [ -f "$FILE" ]; then
              # Reemplaza el newTag en el archivo de kustomization
              sed -i "s|newTag: \".*\"|newTag: \"$NEW_TAG\"|g" "$FILE"
              echo "✅ Updated $FILE"
            fi
          done

      - name: Commit and push
        env:
          NEW_TAG: ${{ needs.detect-new-version.outputs.new_tag }}
        run: |
          git add tenants/*/dev/kustomization.yaml
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit (tag already up to date)"
          else
            git commit -m "chore(dev): promote image $IMAGE_NAME:$NEW_TAG to DEV [skip ci]"
            git push origin main
            echo "✅ DEV promotion committed and pushed"
          fi

      - name: Notify Flux via webhook
        # Flux también recibirá el push webhook de GitHub automáticamente
        # Este paso es informativo
        run: |
          echo "📡 Flux will detect this commit via GitHub webhook"
          echo "🔗 Webhook endpoint: https://<TAILSCALE_IP>:31234/hook/<RECEIVER_TOKEN>"
          echo "⏱️ Expected reconciliation: < 30 seconds"

  open-pr-for-test:
    name: "Open PR to promote to TEST"
    runs-on: ubuntu-latest
    needs: [detect-new-version, promote-dev]
    if: needs.detect-new-version.outputs.should_promote == 'true'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "gitops-bot"
          git config user.email "gitops-bot@github.com"

      - name: Create branch and update TEST overlays
        env:
          NEW_TAG: ${{ needs.detect-new-version.outputs.new_tag }}
        run: |
          BRANCH="promote/test-$NEW_TAG-$(date +%s)"
          git checkout -b $BRANCH
          
          for tenant in team-payments team-auth team-gateway; do
            FILE="tenants/$tenant/test/kustomization.yaml"
            if [ -f "$FILE" ]; then
              sed -i "s|newTag: \".*\"|newTag: \"$NEW_TAG\"|g" "$FILE"
              echo "✅ Updated $FILE"
            fi
          done
          
          git add tenants/*/test/kustomization.yaml
          git commit -m "chore(test): promote image $IMAGE_NAME:$NEW_TAG to TEST"
          git push origin $BRANCH
          
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Create Pull Request for TEST
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
          NEW_TAG: ${{ needs.detect-new-version.outputs.new_tag }}
        run: |
          gh pr create \
            --title "🟡 Promote $IMAGE_NAME:$NEW_TAG → TEST" \
            --body "## Promotion Request: DEV → TEST
          
          **Image:** \`$IMAGE_NAME:$NEW_TAG\`
          **Source environment:** DEV ✅ (auto-deployed)
          **Target environment:** TEST
          
          ### Checklist de aprobación
          - [ ] Smoke tests en DEV pasaron
          - [ ] No hay alertas activas en DEV
          - [ ] El tag ha sido verificado en Docker Hub
          
          ### Impacto
          - \`team-payments-test\`
          - \`team-auth-test\`
          - \`team-gateway-test\`
          
          > ⚠️ **Merge este PR solo cuando los reviewers hayan aprobado.**
          > Flux detectará el merge vía webhook y desplegará en TEST automáticamente.
          
          /cc @AldoNava" \
            --base main \
            --head $BRANCH \
            --label "promotion" \
            --label "test"
